<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedido confirmado</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f7fb; font-family:Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7fb; padding:40px 0;">
    <tr>
        <td align="center">

            <!-- CARD -->
            <table width="700" cellpadding="0" cellspacing="0"
                   style="background-color:#ffffff; border:1px solid #e2e8f0; border-radius:18px; overflow:hidden;">

                <!-- HEADER -->
                <tr>
                    <td style="background:linear-gradient(135deg,#16a34a,#15803d); padding:40px; text-align:center;">
                        <h1 style="margin:0; color:white; font-size:32px;">✅ Pedido confirmado</h1>
                    </td>
                </tr>

                <!-- CONTENT -->
                <tr>
                    <td style="padding:40px; color:#334155;">

                        <p style="font-size:22px; margin:0 0 10px 0;">Gracias por tu compra</p>

                        <p style="margin:0 0 20px 0;">
                            Hemos recibido correctamente tu pedido y ya está siendo procesado.
                        </p>

                        <!-- ORDER BOX -->
                        <table width="100%" cellpadding="0" cellspacing="0"
                               style="background-color:#f8fafc; border-radius:12px; padding:20px;">

                            <tr>
                                <td style="padding-bottom:10px;">
                                    <strong>Pedido:</strong>
                                    <span th:text="${orderId}"></span>
                                </td>
                            </tr>

                            <tr>
                                <td style="padding-bottom:20px;">
                                    <strong>Fecha:</strong>
                                    <span th:text="${createdAt}"></span>
                                </td>
                            </tr>

                            <!-- ITEMS -->
                            <tr th:each="item : ${items}">
                                <td style="padding:15px 0; border-bottom:1px solid #e2e8f0;">
                                    <div style="font-weight:bold; color:#0f172a;"
                                         th:text="${item.productSnapshotEntity.name}">
                                        Product Name
                                    </div>

                                    <div style="font-size:14px; color:#64748b; margin-top:6px;">
                                        Cantidad:
                                        <span th:text="${item.quantity}"></span>
                                        · Precio:
                                        <span th:text="${item.productSnapshotEntity.price}"></span> €
                                    </div>
                                </td>
                            </tr>

                            <!-- TOTAL -->
                            <tr>
                                <td style="padding-top:20px; text-align:right; font-size:22px; font-weight:bold; color:#16a34a;">
                                    Total: <span th:text="${total}"></span> €
                                </td>
                            </tr>

                        </table>

                        <!-- BUTTON -->
                        <div style="text-align:center; margin-top:35px;">
                            <a href="http://localhost:4200/orders"
                               style="display:inline-block; padding:14px 28px; background-color:#16a34a; color:white; text-decoration:none; border-radius:10px; font-weight:bold;">
                                Ver pedido
                            </a>
                        </div>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="background-color:#f8fafc; text-align:center; padding:24px; font-size:13px; color:#94a3b8;">
                        © 2026 Tu Plataforma · Gracias por confiar en nosotros
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
