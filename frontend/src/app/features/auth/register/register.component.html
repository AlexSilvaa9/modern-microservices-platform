<div class="auth-container">
    <div class="auth-card">
        <h2>{{ 'REGISTER.TITLE' | translate }}</h2>
        <p>{{ 'REGISTER.SUBTITLE' | translate }}</p>
        <div *ngIf="isLoginDatabaseEnabled">

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label for="username">{{ 'REGISTER.USERNAME' | translate }}</label>
                <input data-testid="register-username-input" id="username" type="text" class="p-inputtext" formControlName="username" />
                <div class="error-msg"
                    *ngIf="registerForm.get('username')?.invalid && registerForm.get('username')?.touched">
                    Username is required.
                </div>
            </div>

            <div class="form-group">
                <label for="email">{{ 'LOGIN.EMAIL' | translate }}</label>
                <input data-testid="register-email-input" id="email" type="email" class="p-inputtext" formControlName="email" />
                <div class="error-msg" *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                    A valid email is required.
                </div>
            </div>

            <div class="form-group">
                <label for="password">{{ 'LOGIN.PASSWORD' | translate }}</label>
                <input data-testid="register-password-input" id="password" type="password" class="p-inputtext" formControlName="password" />
                <div class="error-msg"
                    *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                    Password must be at least 8 characters long.
                </div>
            </div>

            <button data-testid="register-submit-button" type="submit" class="btn primary" style="width: 100%; margin-top: 1rem;" [disabled]="isLoading">
                {{ isLoading ? ('GENERAL.LOADING' | translate) : ('REGISTER.SUBMIT' | translate) }}
            </button>

        </form>

        <div class="p-divider">
            <span>OR</span>
        </div>

        </div>
        <button data-testid="register-google-button" type="button" class="btn secondary" (click)="loginWithGoogle()">
            <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
                <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238598)">
                    <path fill="#4285F4"
                        d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z" />
                    <path fill="#34A853"
                        d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z" />
                    <path fill="#FBBC05"
                        d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z" />
                    <path fill="#EA4335"
                        d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 42.369 C -8.804 40.429 -11.514 39.239 -14.754 39.239 C -19.444 39.239 -23.494 41.939 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z" />
                </g>
            </svg>
            {{ 'REGISTER.GOOGLE' | translate }}
        </button>

        <div class="auth-footer">
            <a data-testid="register-login-link" routerLink="/auth/login">{{ 'REGISTER.SIGNIN' | translate }}</a>
        </div>
    </div>
</div>
