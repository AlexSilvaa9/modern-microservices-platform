<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bienvenido</title>
</head>

<body style="margin:0; padding:0; background-color:#f4f7fb; font-family:Arial, Helvetica, sans-serif;">

<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f7fb; padding:40px 0;">
    <tr>
        <td align="center">

            <!-- CARD -->
            <table width="600" cellpadding="0" cellspacing="0"
                   style="background-color:#ffffff; border:1px solid #e2e8f0; border-radius:16px; overflow:hidden;">

                <!-- HEADER -->
                <tr>
                    <td style="background:linear-gradient(135deg,#2563eb,#1d4ed8); padding:40px; text-align:center;">
                        <h1 style="margin:0; color:white; font-size:30px;">
                            ¡Bienvenido!
                        </h1>
                    </td>
                </tr>

                <!-- CONTENT -->
                <tr>
                    <td style="padding:40px; color:#334155; line-height:1.6;">

                        <p style="margin:0 0 20px 0; font-size:16px;">
                            Hola
                            <span style="color:#2563eb; font-weight:bold;" th:text="${username}">
                                Usuario
                            </span>,
                        </p>

                        <p style="margin:0 0 20px 0;">
                            Tu cuenta ha sido creada correctamente y ya puedes comenzar a utilizar la plataforma.
                        </p>

                        <p style="margin:0 0 30px 0;">
                            Estamos encantados de tenerte con nosotros 🚀
                        </p>

                        <!-- BUTTON -->
                        <div style="text-align:center;">
                            <a href="http://localhost:4200"
                               style="display:inline-block; padding:14px 28px; background-color:#2563eb; color:white; text-decoration:none; border-radius:10px; font-weight:bold;">
                                Empezar ahora
                            </a>
                        </div>

                    </td>
                </tr>

                <!-- FOOTER -->
                <tr>
                    <td style="background-color:#f8fafc; text-align:center; padding:24px; font-size:13px; color:#94a3b8;">
                        © 2026 Tu Plataforma · Todos los derechos reservados
                    </td>
                </tr>

            </table>

        </td>
    </tr>
</table>

</body>
</html>
