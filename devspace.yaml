version: v2beta1
name: devspace
pipelines:
  dev:
    run: -|
      start_dev user-service product-service cart-service
dev:
  user-service:
    imageSelector: "user-service:1.0.0"
    command: ["java", "-jar", "/app/user-service-1.0.0.jar"]
    sync:
      - path: ./services/user-service/target/user-service-1.0.0.jar:/app/user-service-1.0.0.jar
        disableDownload: true
        onUpload:
          restartContainer: true
    ports:
      - port: "8081:8080"
    open:
      - url: http://localhost:8081/api/swagger-ui/index.html
    logs:
      enabled: true

  product-service:
    imageSelector: "product-service:1.0.0"
    command: ["java", "-jar", "/app/product-service-1.0.0.jar"]
    sync:
      - path: ./services/product-service/target/product-service-1.0.0.jar:/app/product-service-1.0.0.jar
        disableDownload: true
        onUpload:
          restartContainer: true
    ports:
      - port: "8082:8080"
    open:
      - url: http://localhost:8082/api/swagger-ui/index.html
    logs:
      enabled: true

  cart-service:
    imageSelector: "cart-service:1.0.0"
    command: ["java", "-jar", "/app/cart-service-1.0.0.jar"]
    sync:
      - path: ./services/cart-service/target/cart-service-1.0.0.jar:/app/cart-service-1.0.0.jar
        disableDownload: true
        onUpload:
          restartContainer: true
    ssh:
      enabled: true
    ports:
      - port: "8083:8080"
    open:
      - url: http://localhost:8083/api/swagger-ui/index.html
    logs:
      enabled: true


