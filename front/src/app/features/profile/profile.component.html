<div class="profile-page">
    <div class="page-header">
        <div class="avatar-circle">
            <img *ngIf="avatarUrl" [src]="avatarUrl" alt="Avatar" />
            <i *ngIf="!avatarUrl" class="bi bi-person-circle"></i>
        </div>
        <div class="header-text">
            <h2>{{ 'PROFILE.TITLE' | translate }}</h2>
            <p>{{ 'PROFILE.SUBTITLE' | translate }}</p>
        </div>
    </div>

    <div class="profile-content">
        <div class="section-container">
            <h3>{{ 'PROFILE.PERSONAL_INFO' | translate }}</h3>
            <form [formGroup]="profileForm">
                <div class="form-group">
                    <label for="provider">{{ 'PROFILE.PROVIDER' | translate }}</label>
                    <input id="provider" type="text" class="p-inputtext" formControlName="provider" />
                </div>

                <div class="form-group">
                    <label for="email">{{ 'LOGIN.EMAIL' | translate }}</label>
                    <input id="email" type="email" class="p-inputtext" formControlName="email" />
                </div>

                <div class="form-group">
                    <label for="username">{{ 'REGISTER.USERNAME' | translate }}</label>
                    <input id="username" type="text" class="p-inputtext" formControlName="username" />
                </div>

                <div class="form-group">
                    <label for="roles">{{ 'PROFILE.ROLES' | translate }}</label>
                    <input id="roles" type="text" class="p-inputtext" formControlName="roles" />
                </div>

                <div class="form-group">
                    <label for="imageUrl">{{ 'PROFILE.IMAGE' | translate }}</label>
                    <input id="imageUrl" type="text" class="p-inputtext" formControlName="imageUrl" />
                </div>

                <button type="button" class="p-button" disabled>
                    {{ 'PROFILE.SAVE' | translate }}
                </button>
            </form>
        </div>

        <!-- Password Change Section -->
        <div class="section-container">
            <h3>{{ 'PROFILE.CHANGE_PASSWORD' | translate }}</h3>
            <form [formGroup]="passwordForm" (ngSubmit)="onChangePassword()">
                <div class="form-group">
                    <label for="oldPassword">{{ 'PROFILE.OLD_PASSWORD' | translate }}</label>
                    <input id="oldPassword" type="password" class="p-inputtext" formControlName="oldPassword" />
                </div>

                <div class="form-group">
                    <label for="newPassword">{{ 'PROFILE.NEW_PASSWORD' | translate }}</label>
                    <input id="newPassword" type="password" class="p-inputtext" formControlName="newPassword" />
                </div>

                <div class="form-group">
                    <label for="confirmPassword">{{ 'PROFILE.CONFIRM_PASSWORD' | translate }}</label>
                    <input id="confirmPassword" type="password" class="p-inputtext" formControlName="confirmPassword" />
                </div>

                <button type="submit" class="p-button" [disabled]="passwordForm.invalid || isLoading">
                    {{ isLoading ? ('GENERAL.LOADING' | translate) : ('PROFILE.UPDATE_PASSWORD' | translate) }}
                </button>
            </form>
        </div>
    </div>
</div>
