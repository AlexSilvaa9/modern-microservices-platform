<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login con Google</title>
</head>

<body>
<h2>Login de prueba</h2>

<button onclick="loginWithGoogle()">
    Iniciar sesión con Google
</button>

<script>
    function loginWithGoogle() {
        const clientId = "531484178477-8dlo3be4j6t71d06maccfmanndnchthr.apps.googleusercontent.com";
        const redirectUri = "http://localhost:8081/auth/google/callback";
        const scope = "openid email profile";

        const googleAuthUrl =
            "https://accounts.google.com/o/oauth2/v2/auth" +
            "?client_id=" + clientId +
            "&redirect_uri=" + encodeURIComponent(redirectUri) +
            "&response_type=code" +
            "&scope=" + encodeURIComponent(scope) +
            "&access_type=offline" +
            "&prompt=consent";

        window.location.href = googleAuthUrl;
    }

    // Callback handler simple
    (function handleCallback() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");

        if (code) {
            console.log("OAuth code recibido:", code);

            // aquí normalmente llamarías a tu backend para intercambiar el code por token
            // fetch("/auth/google/callback?code=" + code)

            // redirección final a swagger
            window.location.href = "http://localhost:8002/swagger-ui/index.html";
        }
    })();
</script>

</body>
</html>
