apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
data:
  application.yml: |-
    server:
      servlet:
        context-path: /api
    
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,env,configprops
      endpoint:
        health:
          show-details: always
 
    security:
      jwt-properties:
        secret: ${JWT_SECRET}
        expiration-ms: 3600000
      whitelist: /auth/**,/oauth2/**,/swagger-ui/**,/v3/api-docs/**,/h2-console/**,/product/**
    logging:
      level:
        com:
          microservices: TRACE
        org:
          springframework:
            security: DEBUG
            security.web.FilterChainProxy: DEBUG
            security.authorization: TRACE
          hibernate:
            SQL: DEBUG
            orm:
              jdbc:
                bind: TRACE


  product-service.yml: |-
    spring:
      sql:
        init:
          mode: always
      application:
        name: product-service
      datasource:
        url: jdbc:h2:mem:productdb
        driverClassName: org.h2.Driver
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}  
      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: create-drop
        show-sql: true
        defer-datasource-initialization: true
    
      h2:
        console:
          enabled: true


  cart-service.yml: |-
    app:
      environment: prod
    spring:
      application:
        name: cart-service
      cloud:
        kubernetes:
          discovery:
            enabled: true
      datasource:
        url: jdbc:h2:mem:cartdb
        driverClassName: org.h2.Driver
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}  
      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: create-drop
        show-sql: true
      h2:
        console:
          enabled: true
          path: /h2-console

    feign:
      client:
        config:
          catalog-service:
            connect-timeout: 5000
            read-timeout: 5000
          user-service:
            connect-timeout: 5000
            read-timeout: 5000


  user-service.yml: |-
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: http://localhost:8081/api/auth/google/callback
 
    spring:
      application:
        name: user-service
      datasource:
        url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        driverClassName: org.h2.Driver
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}  
      jpa:
        hibernate:
          ddl-auto: create
        defer-datasource-initialization: true
        show-sql: true
      h2:
        console:
          enabled: true
          path: /h2-console
      sql:
        init:
          mode: always



  