apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
data:
  application.yml: |-
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,env,configprops
      endpoint:
        health:
          show-details: always
    spring:
      zipkin:
        base-url: http://zipkin:9411
        enabled: false
        sleuth:
          sampler:
            probability: 1.0
    security:
      jwt:
        secret: 7uKf8m1cRjQ9bVhL4WzD6oF1X2nP8sYx3AaQ7jVgMhS0=
        expiration-ms: 3600000
    logging:
      level:
        com:
          microservices:
            core:
              security:
                JwtFilter: TRACE
        org:
          springframework:
            security: DEBUG
            security.web.FilterChainProxy: DEBUG
            security.authorization: TRACE

  catalog-service.yml: |-
    server:
      port: 8080
    spring:
      sql:
        init:
          mode: always
      application:
        name: catalog-service
      datasource:
        url: jdbc:h2:mem:catalogdb
        driverClassName: org.h2.Driver
        username: sa
        password: password
      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: create-drop
        show-sql: true
        defer-datasource-initialization: true
      h2:
        console:
          enabled: true
          path: /h2-console
    logging:
      level:
        com.microservices.catalog: DEBUG

  cart-service.yml: |-
    server:
      port: 8080
    app:
      environment: prod
    spring:
      application:
        name: cart-service
      datasource:
        url: jdbc:h2:mem:cartdb
        driverClassName: org.h2.Driver
        username: sa
        password: password
      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: create-drop
        show-sql: true
      h2:
        console:
          enabled: true
    feign:
      client:
        config:
          catalog-service:
            connect-timeout: 5000
            read-timeout: 5000
    logging:
      level:
        com.microservices.cart: DEBUG

  user-service.yml: |-
    server:
      port: 8080
    spring:
      datasource:
        url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        driverClassName: org.h2.Driver
        username: sa
        password:
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: false
    logging:
      level:
        com.microservices.user: DEBUG

  