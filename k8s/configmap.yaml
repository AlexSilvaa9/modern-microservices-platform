apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
data:
  application.yml: |-
    server:
      servlet:
        context-path: /api
    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,env,configprops
      endpoint:
        health:
          show-details: always
    spring:
      zipkin:
        base-url: http://zipkin:9411
        enabled: false
        sleuth:
          sampler:
            probability: 1.0
    security:
      jwt-properties:
        secret: ${JWT_SECRET}
        expiration-ms: 3600000
      whitelist: /auth/**,/oauth2/**,/swagger-ui/**,/v3/api-docs/**,/h2-console/**
    logging:
      level:
        com:
          microservices:
            core:
              security:
                JwtFilter: TRACE
        org:
          springframework:
            security: DEBUG
            security.web.FilterChainProxy: DEBUG
            security.authorization: TRACE
          hibernate:
            SQL: DEBUG
            orm:
              jdbc:
                bind: TRACE


  catalog-service.yml: |-
    server:
      port: 8080
    spring:
      sql:
        init:
          mode: always
      application:
        name: catalog-service
      datasource:
        url: jdbc:h2:mem:catalogdb
        driverClassName: org.h2.Driver
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}  
      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: create-drop
        show-sql: true
        defer-datasource-initialization: true
      h2:
        console:
          enabled: true
          path: /h2-console
    logging:
      level:
        com.microservices.catalog: DEBUG

  cart-service.yml: |-
    server:
      port: 8080
    app:
      environment: prod
    spring:
      application:
        name: cart-service
      cloud:
        kubernetes:
          discovery:
            enabled: true
      datasource:
        url: jdbc:h2:mem:cartdb
        driverClassName: org.h2.Driver
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}  
      jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
          ddl-auto: create-drop
        show-sql: true
      h2:
        console:
          enabled: true
    feign:
      client:
        config:
          catalog-service:
            connect-timeout: 5000
            read-timeout: 5000
          user-service:
            connect-timeout: 5000
            read-timeout: 5000
    logging:
      level:
        com.microservices.cart: DEBUG

  user-service.yml: |-
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: http://localhost:8081/auth/google/callback
    server:
      port: 8080
     
    spring:
      application:
        name: user-service
      datasource:
        url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
        driverClassName: org.h2.Driver
        username: ${DATABASE_USERNAME}
        password: ${DATABASE_PASSWORD}  
      h2:
        console:
          enabled: true
          path: /h2-console

      jpa:
        hibernate:
          ddl-auto: create
        defer-datasource-initialization: true
        show-sql: true
      sql:
        init:
          mode: always

    logging:
      level:
        com.microservices.user: DEBUG

  